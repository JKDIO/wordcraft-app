{"name":"Build WordCraft APK","on":{"workflow_dispatch":{},"push":{"paths":[".github/workflows/build-apk.yml"]}},"jobs":{"build":{"runs-on":"ubuntu-latest","steps":[{"name":"Setup Node","uses":"actions/setup-node@v4","with":{"node-version":"22"}},{"name":"Setup Java","uses":"actions/setup-java@v4","with":{"distribution":"temurin","java-version":"21"}},{"name":"Accept licenses","run":"yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true"},{"name":"Scaffold","run":"set -e && mkdir -p app/www && cd app && npm init -y >/dev/null && npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest && npm install @capacitor-community/text-to-speech --legacy-peer-deps && for f in index.html app.css main.js content.json sp-learner.png sp-admin.png; do curl -fsSL https://wordcraft-app.vercel.app/$f -o www/$f; done && npx --yes cap init WordCraft app.wordcraft.yehan --web-dir www && rm -f capacitor.config.ts && echo eyJhcHBJZCI6ImFwcC53b3JkY3JhZnQueWVoYW4iLCJhcHBOYW1lIjoiV29yZENyYWZ0Iiwid2ViRGlyIjoid3d3Iiwic2VydmVyIjp7InVybCI6Imh0dHBzOi8vd29yZGNyYWZ0LWFwcC52ZXJjZWwuYXBwIiwiY2xlYXJ0ZXh0IjpmYWxzZSwiYW5kcm9pZFNjaGVtZSI6Imh0dHBzIn19 | base64 -d > capacitor.config.json && npx --yes cap add android && npx --yes cap sync android && mkdir -p assets && curl -fsSL https://wordcraft-app.vercel.app/icon-1024.png -o assets/icon.png && curl -fsSL https://wordcraft-app.vercel.app/splash-2732.png -o assets/splash.png && cp assets/splash.png assets/splash-dark.png && npm install @capacitor/assets@latest && npx --yes @capacitor/assets generate --android --iconBackgroundColor '#182536' --iconBackgroundColorDark '#182536'"},{"name":"Build APK","run":"cd app/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace"},{"name":"Collect","run":"cp app/android/app/build/outputs/apk/debug/app-debug.apk WordCraft.apk"},{"name":"Upload","uses":"actions/upload-artifact@v4","with":{"name":"WordCraft-APK","path":"WordCraft.apk","if-no-files-found":"error"}}]}}}

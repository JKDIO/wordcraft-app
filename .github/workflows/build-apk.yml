{"name":"Build WordCraft APK","on":{"workflow_dispatch":{},"push":{"paths":[".github/workflows/build-apk.yml"]}},"jobs":{"build":{"runs-on":"ubuntu-latest","steps":[{"name":"Setup Node","uses":"actions/setup-node@v4","with":{"node-version":"20"}},{"name":"Setup Java","uses":"actions/setup-java@v4","with":{"distribution":"temurin","java-version":"21"}},{"name":"Accept licenses","run":"yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true"},{"name":"Scaffold","run":"set -e && mkdir -p app/www && cd app && npm init -y >/dev/null && npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest && for f in index.html app.css main.js content.json; do curl -fsSL https://wordcraft-app.vercel.app/$f -o www/$f; done && npx --yes cap init WordCraft app.wordcraft.yehan --web-dir www && npx --yes cap add android"},{"name":"Build APK","run":"cd app/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace"},{"name":"Collect","run":"cp app/android/app/build/outputs/apk/debug/app-debug.apk WordCraft.apk"},{"name":"Upload","uses":"actions/upload-artifact@v4","with":{"name":"WordCraft-APK","path":"WordCraft.apk","if-no-files-found":"error"}}]}}}
